name: Identify Flaky Tests

on:
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of times to run each test'
        required: true
        default: '10'
        type: string

permissions:
  contents: read

jobs:
  test-flakes:
    name: Run Tests Multiple Times
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          check-latest: false

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        shell: bash
        run: go build -v ./...

      - name: Test for Flakes
        shell: bash
        run: |
          COUNT="${{ github.event.inputs.runs || '10' }}"
          echo "Running tests $COUNT times to identify flakes..."
          gotestsum --junitfile test-results-${{ matrix.os }}.xml --format testdox -- -count=$COUNT ./...
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flake-test-results-${{ matrix.os }}
          path: test-results-${{ matrix.os }}.xml
          retention-days: 7
